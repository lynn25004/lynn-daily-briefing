name: Watchdog (briefing catch-up)

on:
  schedule:
    # 09:00 Taipei 專門補晨報（主排程 08:30 Taipei，給 30 分鐘 buffer）
    - cron: "0 1 * * *"
    # 每小時 10 分跑後備檢查（09:10 ~ 23:10 Taipei）
    - cron: "10 1-15 * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check & catch-up
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Taipei
        run: python3 scripts/watchdog.py

      - name: Commit any new markers
        run: |
          git config user.name  "watchdog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs/
          if ! git diff --cached --quiet; then
            DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
            git commit -m "watchdog: catch-up $DATE"
            git push
          else
            echo "No changes to commit."
          fi
