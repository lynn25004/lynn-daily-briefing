name: Daily Briefing (08:30 Taipei)

on:
  # 排程交給 cron-job.org（jobId 7516773）經由 API 觸發 workflow_dispatch。
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run briefing
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Taipei
        run: python3 scripts/briefing.py

      - name: Commit pushed marker
        run: |
          git config user.name  "briefing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs/
          if ! git diff --cached --quiet; then
            DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
            git commit -m "briefing: pushed $DATE"
            git push
          else
            echo "No marker changes to commit."
          fi
